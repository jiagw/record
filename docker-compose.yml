services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: record
      POSTGRES_PASSWORD: record
      POSTGRES_DB: record
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U record -d record"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://record:record@postgres:5432/record?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
      PORT: 3000
      HOST: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
